<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Doom Credits</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 24px;
        font-family: "Segoe UI", Arial, sans-serif;
        background: #0a1119;
        color: #eff4ff;
      }

      main {
        max-width: 720px;
        margin: 0 auto;
        display: grid;
        gap: 16px;
      }

      a {
        color: #8cd7ff;
      }

      .panel {
        padding: 18px 20px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.03);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="panel">
        <h1>Doom in Taaniel OS</h1>
        <p>This browser bundle uses local assets only.</p>
      </div>
      <div class="panel">
        <h2>Runtime</h2>
        <p>Powered by <a href="https://github.com/js-dos/emulators" target="_blank" rel="noreferrer">js-dos</a>.</p>
      </div>
      <div class="panel">
        <h2>Game Content</h2>
        <p>Playable content comes from <a href="https://github.com/freedoom/freedoom" target="_blank" rel="noreferrer">Freedoom</a>.</p>
      </div>
    </main>
  </body>
</html>
